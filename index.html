<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Austėjos Gimtadienis 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#f0ede8;height:100%;display:flex;flex-direction:column}
:root{--pink:#e8547a;--gold:#f0c060;--card:#14141c;--border:#2a2a3a;--muted:#8a8a9a;--green:#50d090}
.screen{display:none;height:100%;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* LOGIN */
#login{align-items:center;justify-content:center;text-align:center;padding:2rem;background:radial-gradient(ellipse at 50% 0%,#2a0a1a 0%,#0a0a0f 70%);overflow-y:auto}
.float{animation:float 3s ease-in-out infinite;font-size:3rem;margin-bottom:1rem}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#login h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:.4rem}
#login p{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
.login-box{width:100%;max-width:320px;display:flex;flex-direction:column;gap:.875rem}
.code-input{background:var(--card);border:1px solid var(--border);color:#f0ede8;padding:1.1rem 1rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1.1rem;outline:none;width:100%;text-align:center;letter-spacing:.15em;text-transform:uppercase;-webkit-appearance:none}
.code-input:focus{border-color:var(--pink)}
.code-input::placeholder{letter-spacing:normal;text-transform:none;color:var(--muted);font-size:.9rem}
.login-btn{background:var(--pink);color:#fff;border:none;padding:1rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;width:100%}
.login-err{color:var(--pink);font-size:.85rem;min-height:1.2rem}

/* GAME */
#game{background:#0a0a0f}
.game-header{padding:.85rem 1rem .7rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.team-name{font-family:'Playfair Display',serif;color:var(--gold);font-size:1rem}
.score-badge{background:var(--card);border:1px solid var(--border);padding:.3rem .75rem;border-radius:20px;font-size:.85rem;color:var(--gold);font-weight:500}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:.75rem;text-align:center;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--pink);border-bottom-color:var(--pink)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:1.25rem 1rem}
.tab-content.active{display:block}

/* QUESTION CARD */
.q-progress{font-size:.78rem;color:var(--muted);margin-bottom:.75rem;display:flex;justify-content:space-between}
.location-tag{display:inline-flex;align-items:center;gap:.4rem;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:.35rem .85rem;font-size:.8rem;color:var(--muted);margin-bottom:1rem}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.q-card h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:#f0ede8;line-height:1.4;margin-bottom:1rem}
.answer-row{display:flex;gap:.5rem}
.answer-input{flex:1;background:#0a0a0f;border:1px solid var(--border);color:#f0ede8;padding:.8rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;-webkit-appearance:none}
.answer-input:focus{border-color:var(--pink)}
.submit-btn{background:var(--pink);color:#fff;border:none;padding:.8rem 1.1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;white-space:nowrap}
.feedback{margin-top:.75rem;padding:.6rem .85rem;border-radius:8px;font-size:.85rem;display:none}
.feedback.correct{background:#0d2e1a;color:var(--green);display:block}
.feedback.wrong{background:#2a0a12;color:var(--pink);display:block}
.hints-section{margin-top:1rem}
.hint-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:.7rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;text-align:left;margin-bottom:.5rem;transition:all .2s}
.hint-btn:hover{border-color:var(--pink);color:#f0ede8}
.hint-revealed{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:#f0ede8;margin-bottom:.5rem}
.hint-cost{color:var(--pink);font-size:.78rem;float:right}
.skip-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:.7rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;margin-top:.5rem}
.next-btn{width:100%;background:var(--green);color:#0a0a0f;border:none;padding:.9rem;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;margin-top:.75rem;display:none}
.pts-pill{display:inline-block;background:#1a2e1a;color:var(--green);border-radius:20px;padding:.2rem .65rem;font-size:.78rem;margin-left:.4rem}
.loc-img{width:100%;border-radius:12px;margin-bottom:1rem;object-fit:contain;border:1px solid var(--border);display:block}

/* BONUS */
.bonus-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.85rem}
.bonus-card h4{font-size:.95rem;margin-bottom:.4rem}
.bonus-card p{font-size:.82rem;color:var(--muted);margin-bottom:.75rem}
.bonus-done{opacity:.5;pointer-events:none}
.bonus-done h4::after{content:' ✓';color:var(--green)}
.bonus-mandatory{border-color:var(--gold)}
.mandatory-badge{display:inline-block;background:#2a2000;color:var(--gold);border-radius:20px;padding:.2rem .65rem;font-size:.75rem;font-weight:500;margin-bottom:.6rem}
.bonus-answer-row{display:flex;gap:.5rem;margin-top:.5rem}
.bonus-input{flex:1;background:#0a0a0f;border:1px solid var(--border);color:#f0ede8;padding:.7rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;-webkit-appearance:none}
.bonus-input:focus{border-color:var(--pink)}
.bonus-submit{background:var(--pink);color:#fff;border:none;padding:.7rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer}
.bonus-feedback{margin-top:.5rem;padding:.5rem .75rem;border-radius:8px;font-size:.82rem}
.bonus-feedback.correct{background:#0d2e1a;color:var(--green)}
.bonus-feedback.wrong{background:#2a0a12;color:var(--pink)}

/* FINISH */
#finish{align-items:center;justify-content:center;text-align:center;padding:2rem;background:radial-gradient(ellipse at 50% 0%,#1a2a0a 0%,#0a0a0f 70%);overflow-y:auto}
#finish h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:.5rem}
#finish p{color:var(--muted);margin-bottom:1rem}
.final-score{font-size:3rem;font-family:'Playfair Display',serif;color:var(--green);margin:1rem 0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="float">🎂</div>
  <h1>Austėjos Gimtadienis</h1>
  <p>Įvesk savo komandos slaptažodį</p>
  <div class="login-box">
    <input class="code-input" id="codeInp" type="text" placeholder="Slaptažodis..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="login-btn" onclick="doLogin()">Prisijungti 🚗</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <span class="team-name" id="teamLabel">—</span>
    <span class="score-badge" id="scoreLabel">0 tšk.</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('main')">🗺️ Maršrutas</div>
    <div class="tab" onclick="switchTab('bonus')">⭐ Bonusai</div>
  </div>
  <div class="tab-content active" id="tab-main">
    <div class="q-progress">
      <span id="qProgress">Klausimas 1 / 8</span>
      <span id="qPts" style="color:var(--gold)"></span>
    </div>
    <img id="locImg" class="loc-img" src="" alt="" style="display:none">
    <div id="preHints"></div>
    <div class="q-card">
      <h3 id="qText">—</h3>
      <div class="answer-row">
        <input class="answer-input" id="ansInp" type="text" placeholder="Atsakymas..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="submit-btn" onclick="submitAnswer()">Tikrinti</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="hints-section" id="hintsSection"></div>
    <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">Praleisti (0 tšk.)</button>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Kitas klausimas →</button>
  </div>
  <div class="tab-content" id="tab-bonus">
    <div id="bonusList"></div>
  </div>
</div>

<!-- FINISH -->
<div id="finish" class="screen">
  <div style="font-size:3rem;margin-bottom:1rem">🏆</div>
  <h1>Sveikiname!</h1>
  <p id="finishTeam"></p>
  <div class="final-score" id="finishScore"></div>
  <p style="color:var(--muted);font-size:.85rem">Maršrutas baigtas! 🎉</p>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxcrrSJax5n9BFS7wnWXhXzBZdsFrDV9BkfPeOtU1q0-wuvch9BmILAJOHFTmcshtygCA/exec';

// ── TEAMS & ROUTES ──────────────────────────────────────────────
const LOCATIONS = [
  'Namai',               // 0
  'Bukiškio progimnazija', // 1
  'Jeruzalės progimnazija',// 2
  'Ateities 2E',         // 3
  'Druskos prie bažnyčios',// 4
  'Verkių rūmai',        // 5
  'Parkovkė',            // 6
  'Gulbinų ežeras',      // 7
  'Haneris',             // 8
  'Partizanai',          // 9
];

const TEAMS = {
  'SPURGA': {
    name: '1 Mašina',
    route: [1,2,3,4,6,7,8,9]
  },
  'ARKLYS': {
    name: '2 Mašina',
    route: [9,8,7,6,4,3,2,1]
  },
  'POPIERIUS': {
    name: '3 Mašina',
    route: [1,9,8,7,6,4,3,2]
  }
};

// ── QUESTIONS (same pool, indexed by location index) ────────────
// Fill these in when you have the real questions
const IMG_BASE = 'https://belzabubas11.github.io/birthday-hunt/imgs/';
const QUESTIONS = [
  { q: '[Klausimas apie Namus]',       locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas0', img: '' },
  { q: '[Klausimas apie Bukiškį]',     locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas1', img: IMG_BASE+'Bukiskis.jpg.jpg' },
  { q: '[Klausimas apie Jeruzalę]',    locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas2', img: IMG_BASE+'Jeruzales%20progimnazija.jpg.jpg' },
  { q: '[Klausimas apie Ateities 2E]', locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas3', img: IMG_BASE+'Ateities%20G.jpg.jpg' },
  { q: '[Klausimas apie Druskas]',     locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas4', img: IMG_BASE+'Kryziaus%20kelias.jpg.jpg' },
  { q: '[Klausimas apie Verkių rūmus]',locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas5', img: '' },
  { q: '[Klausimas apie Parkovkę]',    locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas6', img: IMG_BASE+'Akmenys.jpg.jpg' },
  { q: '[Klausimas apie Gulbinus]',    locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas7', img: IMG_BASE+'Ezeras.jpg.jpg' },
  { q: '[Klausimas apie Hanerį]',      locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas8', img: IMG_BASE+'Baznycia.jpg.jpg' },
  { q: '[Klausimas apie Partizanus]',  locationHints:['Vietos užuomina 1','Vietos užuomina 2'], hints: ['Atsakymo užuomina 1', 'Atsakymo užuomina 2'], answer: 'atsakymas9', img: '' },
];

const BONUS_TASKS = [
  { id:'b1', type:'trivia', title:'Kada Austėja išsilaikė teises?', desc:'Įvesk datą formatu YYYY-MM-DD', answer:'2024-11-22', pts:3 },
  { id:'b2', type:'trivia', title:'Nuo ko mirė chameleonas?', desc:'Vienas žodis', answer:'hipotermija', pts:3 },
  { id:'b3', type:'mandatory', title:'🎬 Nufilmuokite sveikinimą Austėjai', desc:'Originaliausias sveikinimas laimi.' },
  { id:'b4', type:'trivia', title:'Kokie buvo pirmosios Austėjos mašinos numeriai?', desc:'Pvz. AAA000', answer:'leb279', pts:3 },
  { id:'b5', type:'trivia', title:'Koks Austėjos lygis žaidimuke?', desc:'Skaičius', answer:'67', pts:3 },
  { id:'b6', type:'mandatory', title:'🎭 Suvaidinkite etiudą iš Austėjos gyvenimo', desc:'Video vertinamas gyvai.' },
  { id:'b7', type:'mandatory', title:'🎵 Sudainuokite Austėjos mėgstamiausią dainą', desc:'Pasirodymas atliekamas namuose.' },
];

// ── STATE ───────────────────────────────────────────────────────
const SK = id => `bh_${id}`;
let teamId = null, team = null;

function save(key, val){ localStorage.setItem(SK(teamId+'_'+key), JSON.stringify(val)); }
function load(key, def){ const v=localStorage.getItem(SK(teamId+'_'+key)); return v!==null?JSON.parse(v):def; }

// ── LOGIN ───────────────────────────────────────────────────────
function doLogin(){
  const code = document.getElementById('codeInp').value.trim().toUpperCase();
  if(TEAMS[code]){
    teamId = code;
    team = TEAMS[code];
    document.getElementById('loginErr').textContent = '';
    startGame();
  } else {
    document.getElementById('loginErr').textContent = 'Neteisingas slaptažodis. Bandyk dar kartą.';
  }
}
document.getElementById('codeInp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ── GAME INIT ───────────────────────────────────────────────────
function startGame(){
  document.getElementById('teamLabel').textContent = team.name;
  showScreen('game');
  renderBonus();
  renderQuestion();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', ['main','bonus'][i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── QUESTION RENDER ─────────────────────────────────────────────
function renderQuestion(){
  const qIdx = load('qIdx', 0);
  if(qIdx >= team.route.length){ showFinish(); return; }

  const locIdx = team.route[qIdx];
  const q = QUESTIONS[locIdx];
  const hintsUsed = load('hintsUsed_'+qIdx, 0);
  const answered = load('answered_'+qIdx, false);
  const skipped = load('skipped_'+qIdx, false);
  const totalScore = calcScore();

  document.getElementById('qProgress').textContent = `Klausimas ${qIdx+1} / ${team.route.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('scoreLabel').textContent = totalScore + ' tšk.';
  document.getElementById('qPts').textContent = answered||skipped ? '' : `${5-hintsUsed} tšk.`;

  const locImg = document.getElementById('locImg');
  if(q.img){ locImg.src = q.img; locImg.style.display = 'block'; }
  else { locImg.src = ''; locImg.style.display = 'none'; }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';

  const ansInp = document.getElementById('ansInp');
  ansInp.value = '';
  ansInp.disabled = answered || skipped;

  document.getElementById('skipBtn').style.display = (answered||skipped) ? 'none' : 'block';
  document.getElementById('nextBtn').style.display = (answered||skipped) ? 'block' : 'none';

  // all 4 hints: first 2 = location hints (before question), last 2 = answer hints (after question)
  const allHints = [...q.locationHints, ...q.hints];

  // pre-question hints (location hints = index 0,1)
  const preHints = document.getElementById('preHints');
  preHints.innerHTML = '';
  if(!answered && !skipped){
    for(let i = 0; i < 2; i++){
      if(i < hintsUsed){
        const d = document.createElement('div');
        d.className = 'hint-revealed';
        d.innerHTML = `💡 <strong>Vietos užuomina ${i+1}:</strong> ${allHints[i]}`;
        preHints.appendChild(d);
      } else {
        const b = document.createElement('button');
        b.className = 'hint-btn';
        b.innerHTML = `Rodyti vietos užuominą ${i+1} <span class="hint-cost">-1 tšk.</span>`;
        b.onclick = () => revealHint(qIdx, i);
        preHints.appendChild(b);
        break;
      }
    }
  }

  // post-question hints (answer hints = index 2,3)
  const hs = document.getElementById('hintsSection');
  hs.innerHTML = '';
  if(!answered && !skipped){
    for(let i = 2; i < 4; i++){
      if(i < hintsUsed){
        const d = document.createElement('div');
        d.className = 'hint-revealed';
        d.innerHTML = `💡 <strong>Atsakymo užuomina ${i-1}:</strong> ${allHints[i]}`;
        hs.appendChild(d);
      } else {
        const b = document.createElement('button');
        b.className = 'hint-btn';
        b.innerHTML = `Rodyti atsakymo užuominą ${i-1} <span class="hint-cost">-1 tšk.</span>`;
        b.onclick = () => revealHint(qIdx, i);
        hs.appendChild(b);
        break;
      }
    }
  } else if(answered){
    const d = document.createElement('div');
    d.className = 'feedback correct';
    d.textContent = '✓ Teisingai!';
    d.style.display = 'block';
    hs.appendChild(d);
  } else {
    const d = document.createElement('div');
    d.className = 'feedback wrong';
    d.textContent = 'Praleista — 0 tšk.';
    d.style.display = 'block';
    hs.appendChild(d);
  }
}

function revealHint(qIdx, hintIdx){
  const current = load('hintsUsed_'+qIdx, 0);
  if(hintIdx !== current) return;
  save('hintsUsed_'+qIdx, current+1);
  const locIdx = team.route[qIdx];
  logToSheet(team.name, qIdx+1, LOCATIONS[locIdx], current+1, 0, 'užuomina');
  renderQuestion();
}

function submitAnswer(){
  const qIdx = load('qIdx', 0);
  if(load('answered_'+qIdx, false) || load('skipped_'+qIdx, false)) return;
  const locIdx = team.route[qIdx];
  const q = QUESTIONS[locIdx];
  const val = document.getElementById('ansInp').value.trim().toLowerCase();
  const correct = q.answer.toLowerCase();
  if(val === correct){
    const hintsUsed = load('hintsUsed_'+qIdx, 0);
    const pts = Math.max(5 - hintsUsed, 1);
    const prev = load('score', 0);
    save('score', prev + pts);
    save('answered_'+qIdx, true);
    logToSheet(team.name, qIdx+1, LOCATIONS[locIdx], hintsUsed, pts, 'atsakyta');
    renderQuestion();
  } else {
    const fb = document.getElementById('feedback');
    fb.textContent = 'Neteisingai, bandyk dar kartą 🔍';
    fb.className = 'feedback wrong';
    fb.style.display = 'block';
  }
}

document.getElementById('ansInp').addEventListener('keydown', e => { if(e.key==='Enter') submitAnswer(); });

function skipQuestion(){
  const qIdx = load('qIdx', 0);
  const locIdx = team.route[qIdx];
  save('skipped_'+qIdx, true);
  logToSheet(team.name, qIdx+1, LOCATIONS[locIdx], load('hintsUsed_'+qIdx,0), 0, 'praleista');
  renderQuestion();
}

function nextQuestion(){
  const qIdx = load('qIdx', 0);
  save('qIdx', qIdx+1);
  renderQuestion();
}

function calcScore(){
  let s = load('score', 0);
  let b = load('bonusScore', 0);
  return s + b;
}

// ── BONUS ────────────────────────────────────────────────────────
function renderBonus(){
  const bl = document.getElementById('bonusList');
  bl.innerHTML = '';
  BONUS_TASKS.forEach(task => {
    const card = document.createElement('div');

    if(task.type === 'mandatory'){
      card.className = 'bonus-card bonus-mandatory';
      card.innerHTML = `
        <div class="mandatory-badge">⚡ PRIVALOMA</div>
        <h4>${task.title}</h4>
        <p>${task.desc}</p>
      `;
    } else {
      const done = load('bonus_'+task.id, false);
      card.className = 'bonus-card' + (done ? ' bonus-done' : '');
      card.innerHTML = `
        <h4>${task.title} <span style="color:var(--gold);font-size:.8rem">+${task.pts} tšk.</span></h4>
        <p>${task.desc}</p>
        ${done ? '<div class="bonus-feedback correct">✓ Teisingai! +'+task.pts+' tšk.</div>' : `
          <div class="bonus-answer-row">
            <input class="bonus-input" id="bi_${task.id}" type="text" placeholder="Atsakymas..." autocomplete="off" autocorrect="off" spellcheck="false">
            <button class="bonus-submit" onclick="submitBonus('${task.id}')">Tikrinti</button>
          </div>
          <div class="bonus-feedback" id="bf_${task.id}" style="display:none"></div>
        `}
      `;
    }
    bl.appendChild(card);
  });
}

function submitBonus(id){
  const task = BONUS_TASKS.find(t => t.id === id);
  const inp = document.getElementById('bi_'+id);
  const fb = document.getElementById('bf_'+id);
  const val = inp.value.trim().toLowerCase();
  if(val === task.answer.toLowerCase()){
    const prev = load('bonusScore', 0);
    save('bonusScore', prev + task.pts);
    save('bonus_'+id, true);
    logToSheet(team.name, '-', 'Bonus: '+task.title, 0, task.pts, 'bonus');
    document.getElementById('scoreLabel').textContent = calcScore() + ' tšk.';
    renderBonus();
  } else {
    fb.textContent = 'Neteisingai, bandyk dar kartą 🔍';
    fb.className = 'bonus-feedback wrong';
    fb.style.display = 'block';
  }
}

// ── FINISH ───────────────────────────────────────────────────────
function showFinish(){
  document.getElementById('finishTeam').textContent = team.name;
  document.getElementById('finishScore').textContent = calcScore() + ' tšk.';
  logToSheet(team.name, '-', 'FINISH', 0, calcScore(), 'baigta');
  showScreen('finish');
}

// ── SHEETS SYNC ──────────────────────────────────────────────────
function logToSheet(team, qNum, location, hintsUsed, pts, status){
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const body = {time, team, qNum, location, pts, hintsUsed, status};
  fetch(SHEETS_URL, {method:'POST', body:JSON.stringify(body)}).catch(()=>{});
}

// ── AUTO-RESUME ──────────────────────────────────────────────────
(function(){
  for(const code in TEAMS){
    const k = `bh_${code}_qIdx`;
    if(localStorage.getItem(k) !== null){
      teamId = code;
      team = TEAMS[code];
      const qIdx = load('qIdx', 0);
      if(qIdx >= team.route.length){
        showScreen('finish');
        document.getElementById('finishTeam').textContent = team.name;
        document.getElementById('finishScore').textContent = calcScore() + ' tšk.';
      } else {
        document.getElementById('teamLabel').textContent = team.name;
        showScreen('game');
        renderBonus();
        renderQuestion();
      }
      break;
    }
  }
})();
</script>
</body>
